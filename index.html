<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Monumental Denial - National Historic Landmarks</title>
        <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
        <link rel="preconnect" href="https://kit.fontawesome.com" crossorigin>
        <link href="https://api.mapbox.com/mapbox-gl-js/v3.13.0/mapbox-gl.css" rel="stylesheet">
        <script src="https://api.mapbox.com/mapbox-gl-js/v3.13.0/mapbox-gl.js"></script>
        <script src="https://code.jquery.com/jquery-1.12.4.js"></script>
        <script defer src="https://kit.fontawesome.com/be4ea184d4.js" crossorigin="anonymous"></script>

        <script src="js/ui.js"></script>
        <script src="js/map.js"></script>

          <!-- noUiSlider (Year selection filter) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.css">
  <script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.js"></script>

        <link rel="stylesheet" href="css/main.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
    <!-- Combined Filters for Forms of White Supremacy and Modes of Representation -->
    <div id="sidebar-container">
        <div id="filter-panel">
            <span id="filter-toggle"><i class="fa-duotone fa-regular fa-angle-up"></i></span>
            <div id="filter-content">
                <strong>Forms of White Supremacy</strong><br>
                <label><input type="checkbox" class="supremacy-filter" value="Colonization" checked> Colonization</label>
                <label><input type="checkbox" class="supremacy-filter" value="Nation_Building" checked> Nation Building</label>
                <label><input type="checkbox" class="supremacy-filter" value="Settler_Colonization" checked> Settler Colonization</label>
                <label><input type="checkbox" class="supremacy-filter" value="Slavery" checked> Slavery</label>
                <label><input type="checkbox" class="supremacy-filter" value="State_Formation" checked> State Formation</label>
                <label><input type="checkbox" class="supremacy-filter" value="Racial_Capitalism" checked> Racial Capitalism</label>
                <label><input type="checkbox" class="supremacy-filter" value="None" checked> None</label>
                <hr>
                <strong>Modes of Representation</strong><br>
                <label><input type="checkbox" class="mode-filter" value="Acknowledged" checked style="accent-color:#aec7e8"> Acknowledged</label>
                <label><input type="checkbox" class="mode-filter" value="Multiculturalism" checked style="accent-color:#ffdab3"> Multiculturalism</label>
                <label><input type="checkbox" class="mode-filter" value="Valorization" checked style="accent-color:#98df8a"> Valorization</label>
                <label><input type="checkbox" class="mode-filter" value="Erasure" checked style="accent-color:#f7b6b2"> Erasure</label>
                <label><input type="checkbox" class="mode-filter" value="None" checked style="accent-color:#be92c4"> None</label>
            <div class="mode-symbology-switch">
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" role="switch" id="modeSymbologySwitch"
                onchange="togglemodeSymbology()">
                <label class="form-check-label" for="modeSymbologySwitch">Symbology</label>
            </div>
            </div>

            </div>
        </div>

        <!-- Side Panel Template -->
        <div id="side-panel">
            <div class="side-panel-header">
                <h3 id="side-panel-title"></h3>
                <span id="side-panel-close">&#10005;</span>
            </div>
            <div id="sp-desc">Site description</div>
        </div>
    </div>
    
    <div id="map"></div>

    <!-- Time Slider for Form Year -->
    <div id="slider-panel">
        <label for="year-slider">Form Year: <br><span id="year-value"></span></label>
        <div id="year-slider"></div>
    </div>

    </body>
</html>
