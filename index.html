<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Monumental Denial - National Historic Landmarks</title>
        <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
        <link href="https://api.mapbox.com/mapbox-gl-js/v3.13.0/mapbox-gl.css" rel="stylesheet">
        <script src="https://api.mapbox.com/mapbox-gl-js/v3.13.0/mapbox-gl.js"></script>
        <script src="https://code.jquery.com/jquery-1.12.4.js"></script>

        <script src="js/ui.js"></script>
        <script src="js/map.js"></script>

        <link rel="stylesheet" href="css/main.css">
    </head>
    <body>
    <!-- Combined Filters for Forms of White Supremacy and Modes of Representation -->
    <div id="combined-filters" style="position:absolute;top:20px;left:20px;background:white;padding:16px 24px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.15);z-index:10;min-width:260px;">
        <strong>Forms of White Supremacy:</strong><br>
        <label><input type="checkbox" class="supremacy-filter" value="Colonization" checked> Colonization</label><br>
        <label><input type="checkbox" class="supremacy-filter" value="Nation_Building" checked> Nation Building</label><br>
        <label><input type="checkbox" class="supremacy-filter" value="Settler_Colonization" checked> Settler Colonization</label><br>
        <label><input type="checkbox" class="supremacy-filter" value="Slavery" checked> Slavery</label><br>
        <label><input type="checkbox" class="supremacy-filter" value="State_Formation" checked> State Formation</label><br>
        <label><input type="checkbox" class="supremacy-filter" value="Racial_Capitalism" checked> Racial Capitalism</label>
        <hr>
        <strong>Modes of Representation:</strong><br>
        <label><input type="checkbox" class="mode-filter" value="Acknowledged" checked> Acknowledged</label><br>
        <label><input type="checkbox" class="mode-filter" value="Multiculturalism" checked> Multiculturalism</label><br>
        <label><input type="checkbox" class="mode-filter" value="Erasure" checked> Erasure</label><br>
        <label><input type="checkbox" class="mode-filter" value="Valorization" checked> Valorization</label>
    </div>
    
    <div id="map"></div>

    <!-- Time Slider for Form Year -->
    <div id="slider-container" style="position:absolute;bottom:30px;left:50%;transform:translateX(-50%);background:white;padding:10px 20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.15);z-index:10;">
        <label for="year-slider">Form Year: <span id="year-value"></span></label>
        <input type="range" id="year-slider" min="1950" max="2026" value="2026" step="1" style="width:300px;">
    </div>

    </body>
</html>
